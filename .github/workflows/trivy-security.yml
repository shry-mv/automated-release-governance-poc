name: Trivy Security Scan

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-security:
    name: Repository Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          format: table
          exit-code: 0

      - name: Generate raw JSON evidence
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          format: json
          output: trivy-results.json
          exit-code: 0

      - name: Normalize Trivy evidence
        run: |
          mkdir -p evidence/normalized

          python -m governance_engine.trivy_normalizer \
            --input trivy-results.json \
            --output evidence/normalized/trivy-summary.json

      - name: Evaluate release policy
        run: |
          mkdir -p evidence/decisions

          python -m governance_engine.decision_engine \
            --policy policies/release-policy.toml \
            --evidence evidence/normalized/trivy-summary.json \
            --output evidence/decisions/release-decision.json

      - name: Publish governance decision
        if: always()
        shell: bash
        run: |
          echo "## Release Governance Decision" >> "$GITHUB_STEP_SUMMARY"

          if [ -f evidence/decisions/release-decision.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat evidence/decisions/release-decision.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Decision evidence was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload raw security evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-raw-evidence
          path: trivy-results.json
          retention-days: 30

      - name: Upload normalized security evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-normalized-evidence
          path: evidence/normalized/trivy-summary.json
          retention-days: 30

      - name: Upload governance decision
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-governance-decision
          path: evidence/decisions/release-decision.json
          retention-days: 30

      - name: Enforce release decision
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          decision_path = Path(
              "evidence/decisions/release-decision.json"
          )

          if not decision_path.exists():
              print(
                  "FAIL: governance decision evidence "
                  "was not generated."
              )
              sys.exit(1)

          decision_document = json.loads(
              decision_path.read_text(encoding="utf-8")
          )

          decision = decision_document.get("decision", "FAIL")

          print(f"Release governance decision: {decision}")

          if decision == "FAIL":
              print("Release candidate blocked by policy.")
              sys.exit(1)

          print("Release candidate satisfies the blocking controls.")
          PY